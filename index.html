<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attività di oggi</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  color:#222;
}

.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:white;
  padding:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

h1{
  margin:0 0 10px 0;
  text-align:center;
  font-size:24px;
}

.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  border:none;
  background:#222;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.info{
  margin:15px;
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

#contenuto{
  padding:10px;
}

.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.10);
}

.riga{
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid #eee;
}

.riga:last-child{
  border-bottom:none;
}

.label{
  font-weight:bold;
  margin-bottom:3px;
  color:#555;
}

.valore{
  font-size:16px;
}

.msg{
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

@media print{

  .topbar{
    display:none;
  }

  body{
    background:white;
  }

  .card{
    box-shadow:none;
    border:1px solid #ccc;
    page-break-inside:avoid;
  }

}

</style>
</head>
<body>

<div class="topbar">

  <h1>Attività di oggi</h1>

  <div class="buttons">
    <button onclick="window.print()">🖨️ Stampa</button>
    <button onclick="location.reload()">🔄 Aggiorna</button>
  </div>

</div>

<div class="info" id="info"></div>

<div id="contenuto">
  <div class="msg">Caricamento...</div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRrPaPZ4es97P63Q5Mvt0Y2NfpNjYVIomiMtDQEcFdQj5mq9VBqf3wVxJP4IORcoNhzzTZF2NqjCpk/pub?output=csv";

// COLONNA E
const COLONNA_CONTROLLO = 4;

function pulisciTesto(testo){
  return String(testo || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function getOggi(){

  const oggi = new Date();

  const giorni = [
    "domenica",
    "lunedi",
    "martedi",
    "mercoledi",
    "giovedi",
    "venerdi",
    "sabato"
  ];

  const nomeGiorno = giorni[oggi.getDay()];

  const giorno = oggi.getDate();
  const mese = oggi.getMonth() + 1;
  const anno = oggi.getFullYear();

  const giorno2 = String(giorno).padStart(2,"0");
  const mese2 = String(mese).padStart(2,"0");

  return [
    nomeGiorno,
    `${giorno}/${mese}`,
    `${giorno2}/${mese2}`,
    `${giorno}/${mese}/${anno}`,
    `${giorno2}/${mese2}/${anno}`
  ].map(pulisciTesto);

}

function parseCSV(text){

  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for(let i=0;i<text.length;i++){

    const c = text[i];
    const n = text[i+1];

    if(c === '"' && quote && n === '"'){
      cell += '"';
      i++;

    } else if(c === '"'){
      quote = !quote;

    } else if(c === "," && !quote){
      row.push(cell);
      cell = "";

    } else if((c === "\n" || c === "\r") && !quote){

      if(cell || row.length){
        row.push(cell);
        rows.push(row);

        row = [];
        cell = "";
      }

    } else {

      cell += c;

    }

  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;

}

function creaCards(headers, righe){

  let html = "";

  righe.forEach(riga => {

    html += `<div class="card">`;

    headers.forEach((header, i) => {

      const valore = riga[i];

      if(valore && valore.trim() !== ""){

        html += `
          <div class="riga">
            <div class="label">${header}</div>
            <div class="valore">${valore}</div>
          </div>
        `;

      }

    });

    html += `</div>`;

  });

  return html;

}

async function carica(){

  const oggi = getOggi();

  document.getElementById("info").innerHTML =
    "Filtro automatico sulla colonna E. Oggi sto cercando: <strong>" +
    oggi.join(" / ") +
    "</strong>";

  try{

    const res = await fetch(
      CSV_URL + "&cachebuster=" + new Date().getTime()
    );

    const text = await res.text();

    const dati = parseCSV(text);

    const headers = dati[0];
    const righe = dati.slice(1);

    const filtrate = righe.filter(riga => {

      const cella = pulisciTesto(riga[COLONNA_CONTROLLO]);

      return oggi.some(valore =>
        cella.includes(valore)
      );

    });

    if(filtrate.length === 0){

      document.getElementById("contenuto").innerHTML =
        `<div class="msg">
          Nessuna attività trovata per oggi.
        </div>`;

    } else {

      document.getElementById("contenuto").innerHTML =
        creaCards(headers, filtrate);

    }

  } catch(e){

    document.getElementById("contenuto").innerHTML =
      `<div class="msg">
        Errore nel caricamento del foglio Google.
      </div>`;

    console.error(e);

  }

}

carica();

</script>

</body>
</html>
