<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attività di oggi</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f2f2;padding:20px}
h1{text-align:center}
.info{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;background:white}
th,td{border:1px solid #ccc;padding:8px;text-align:left}
th{background:#222;color:white}
.msg{background:white;padding:20px;border-radius:10px;text-align:center}
</style>
</head>
<body>

<h1>Attività di oggi</h1>
<div class="info" id="info"></div>
<div id="contenuto">Caricamento...</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRrPaPZ4es97P63Q5Mvt0Y2NfpNjYVIomiMtDQEcFdQj5mq9VBqf3wVxJP4IORcoNhzzTZF2NqjCpk/pub?output=csv";

// colonna E = 4
const COLONNA_CONTROLLO = 4;

function pulisciTesto(testo){
  return String(testo || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function getOggi(){
  const oggi = new Date();

  const giorni = [
    "domenica",
    "lunedi",
    "martedi",
    "mercoledi",
    "giovedi",
    "venerdi",
    "sabato"
  ];

  const nomeGiorno = giorni[oggi.getDay()];

  const giorno = oggi.getDate();
  const mese = oggi.getMonth() + 1;
  const anno = oggi.getFullYear();

  const giorno2 = String(giorno).padStart(2,"0");
  const mese2 = String(mese).padStart(2,"0");

  return [
    nomeGiorno,
    `${giorno}/${mese}`,
    `${giorno2}/${mese2}`,
    `${giorno}/${mese}/${anno}`,
    `${giorno2}/${mese2}/${anno}`
  ].map(pulisciTesto);
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    const n = text[i+1];

    if(c === '"' && quote && n === '"'){
      cell += '"';
      i++;
    } else if(c === '"'){
      quote = !quote;
    } else if(c === "," && !quote){
      row.push(cell);
      cell = "";
    } else if((c === "\n" || c === "\r") && !quote){
      if(cell || row.length){
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
    } else {
      cell += c;
    }
  }

  if(cell || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function creaTabella(headers, righe){
  let html = "<table><thead><tr>";

  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";

  righe.forEach(riga => {
    html += "<tr>";
    headers.forEach((_, i) => {
      html += `<td>${riga[i] || ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</tbody></table>";
  return html;
}

async function carica(){
  const oggi = getOggi();

  document.getElementById("info").innerHTML =
    "Sto cercando nella colonna E: <strong>" + oggi.join(" / ") + "</strong>";

  try{
    const res = await fetch(CSV_URL + "&cachebuster=" + new Date().getTime());;
    const text = await res.text();
    const dati = parseCSV(text);

    const headers = dati[0];
    const righe = dati.slice(1);

    const filtrate = righe.filter(riga => {
      const cella = pulisciTesto(riga[COLONNA_CONTROLLO]);
      return oggi.some(valore => cella.includes(valore));
    });

    if(filtrate.length === 0){
      document.getElementById("contenuto").innerHTML =
        `<div class="msg">Nessuna riga trovata per oggi.</div>`;
    } else {
      document.getElementById("contenuto").innerHTML =
        creaTabella(headers, filtrate);
    }

  } catch(e){
    document.getElementById("contenuto").innerHTML =
      `<div class="msg">Errore nel caricamento del foglio.</div>`;
  }
}

carica();
</script>

</body>
</html>
